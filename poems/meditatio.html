        <h1>Meditatio</h1>
        <p id="author">Ezra Pound</p>
        <hr>
        <div id="content">
            
                
                    <div class="stanza">
                        
                            
                                <p class="verse-line">When I carefully consider the curious habits of dogs</p>
                            
                        
                            
                                <p class="verse-line">I am compelled to conclude</p>
                            
                        
                            
                                <p class="verse-line">That man is the superior animal.</p>
                            
                        
                    </div>
                
                    <div class="stanza">
                        
                            
                                <p class="verse-line">When I consider the curious habits of man</p>
                            
                        
                            
                                <p class="verse-line">I confess, my friend, I am puzzled.</p>
                            
                        
                    </div>
